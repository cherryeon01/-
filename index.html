<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>저울 시뮬레이터 – 315g 나누기</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fdf6ec;
  --panel: #fff;
  --accent: #c0622a;
  --accent2: #5a8a3c;
  --dark: #2e1f0e;
  --mid: #7a624a;
  --light: #e0d0b8;
  --shadow: rgba(46,31,14,0.13);
  --green: #4aff6e;
  --lcd: #0d1f0d;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Gowun Dodum', serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 22px 14px 60px;
  background-image:
    radial-gradient(ellipse at 10% 0%, rgba(192,98,42,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 100%, rgba(90,138,60,0.08) 0%, transparent 50%);
}

h1 {
  font-family: 'Black Han Sans', sans-serif;
  font-size: clamp(20px, 5vw, 28px);
  color: var(--dark);
  text-align: center;
  margin-bottom: 4px;
}
.subtitle { font-size: 13px; color: var(--mid); text-align: center; margin-bottom: 24px; }

/* ═══════════════ 레이아웃 ═══════════════ */
.layout {
  width: 100%;
  max-width: 720px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
  align-items: start;
}

/* ═══════════════ 왼쪽: 저울 ═══════════════ */
.scale-col { display: flex; flex-direction: column; gap: 14px; }

/* 저울 본체 */
.scale-body {
  background: linear-gradient(170deg, #e8e0d4 0%, #d0c8bc 100%);
  border-radius: 18px 18px 10px 10px;
  padding: 18px 22px 22px;
  box-shadow:
    0 10px 36px var(--shadow),
    inset 0 1px 0 rgba(255,255,255,0.6),
    inset 0 -2px 6px rgba(0,0,0,0.08);
  position: relative;
}

.scale-brand {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 9px;
  letter-spacing: 4px;
  color: #a89880;
  text-align: center;
  margin-bottom: 14px;
  text-transform: uppercase;
}

/* LCD 디스플레이 */
.lcd-outer {
  background: #28221a;
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 16px;
  box-shadow: inset 0 3px 8px rgba(0,0,0,0.6), 0 1px 0 rgba(255,255,255,0.1);
}
.lcd-inner {
  background: var(--lcd);
  border-radius: 7px;
  padding: 11px 18px;
  display: flex;
  align-items: baseline;
  justify-content: flex-end;
  gap: 5px;
  min-height: 62px;
  position: relative;
  overflow: hidden;
}
.lcd-inner::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg,
    rgba(0,0,0,0.07) 0px, rgba(0,0,0,0.07) 1px,
    transparent 1px, transparent 3px);
  pointer-events: none;
}
.lcd-num {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 44px;
  color: var(--green);
  letter-spacing: 3px;
  text-shadow: 0 0 14px rgba(74,255,110,0.6);
  line-height: 1;
  transition: color 0.2s;
}
.lcd-unit { font-size: 16px; color: rgba(74,255,110,0.65); margin-bottom: 4px; }

/* ── 접시 & 견과류 ── */
.tray-section { position: relative; }

/* 견과류 캔버스 */
.nuts-stage {
  height: 90px;
  position: relative;
  overflow: visible;
}

#nutsCanvas {
  width: 100%;
  height: 90px;
  display: block;
}

/* 접시 */
.tray {
  background: linear-gradient(175deg, #d8d0c4 0%, #b8b0a4 100%);
  border-radius: 50% / 12px;
  height: 20px;
  margin: 0 10px;
  box-shadow:
    inset 0 -3px 8px rgba(0,0,0,0.2),
    0 4px 0 #908878,
    0 6px 10px rgba(0,0,0,0.22);
  position: relative;
}
.tray::before {
  content: '';
  position: absolute;
  top: 4px; left: 20%; right: 20%;
  height: 5px;
  background: rgba(255,255,255,0.22);
  border-radius: 99px;
}

/* 저울 기둥 & 받침 */
.tray-stem {
  width: 10px;
  height: 22px;
  background: linear-gradient(90deg, #b0a898, #c8c0b4, #b0a898);
  margin: 0 auto;
  border-radius: 2px;
}
.tray-base {
  background: linear-gradient(170deg, #c8c0b4 0%, #a89e92 100%);
  border-radius: 8px 8px 4px 4px;
  height: 14px;
  margin: 0 4px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.18);
}

/* ── 정보 카드 ── */
.info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.info-card {
  background: var(--panel);
  border-radius: 13px;
  padding: 12px 10px;
  text-align: center;
  box-shadow: 0 3px 12px var(--shadow);
}
.info-label { font-size: 10px; color: var(--mid); margin-bottom: 4px; letter-spacing: 0.5px; }
.info-val {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 32px;
  line-height: 1;
}
.info-val.red  { color: var(--accent); }
.info-val.grn  { color: var(--accent2); }
.info-sub { font-size: 10px; color: var(--mid); margin-top: 3px; }

/* ── 버튼 ── */
.btn-col { display: flex; flex-direction: column; gap: 9px; }
.btn-main {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 14px;
  padding: 17px;
  font-family: 'Black Han Sans', sans-serif;
  font-size: 19px;
  cursor: pointer;
  box-shadow: 0 5px 0 #8e3d10, 0 7px 18px rgba(192,98,42,0.32);
  transition: all 0.1s;
  position: relative; top: 0;
  letter-spacing: 0.5px;
}
.btn-main:active { top: 4px; box-shadow: 0 1px 0 #8e3d10; }
.btn-main:disabled {
  background: #c8bfb0; box-shadow: 0 5px 0 #a09080;
  cursor: not-allowed; color: #9a9080;
}
.btn-sub {
  background: var(--panel);
  color: var(--mid);
  border: 2px solid var(--light);
  border-radius: 11px;
  padding: 11px;
  font-family: 'Gowun Dodum', serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.12s;
}
.btn-sub:hover { border-color: var(--accent); color: var(--accent); }

/* ═══════════════ 오른쪽: 그릇 ═══════════════ */
.bowls-col { display: flex; flex-direction: column; gap: 10px; }

.bowls-hdr {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 15px;
  color: var(--dark);
  display: flex;
  align-items: center;
  gap: 7px;
}
.badge {
  background: var(--accent2);
  color: #fff;
  border-radius: 99px;
  font-size: 11px;
  padding: 2px 10px;
  font-family: 'Gowun Dodum', serif;
}

.bowls-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  max-height: 420px;
  overflow-y: auto;
  padding-right: 2px;
}
.bowls-grid::-webkit-scrollbar { width: 4px; }
.bowls-grid::-webkit-scrollbar-thumb { background: var(--light); border-radius: 99px; }

/* 그릇 카드 */
.bowl-card {
  background: var(--panel);
  border-radius: 14px;
  padding: 10px 6px 8px;
  text-align: center;
  box-shadow: 0 3px 12px var(--shadow);
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  border: 2px solid var(--light);
}
.bowl-card.full  { border-color: #a8c878; }
.bowl-card.rem   { border-color: #e8aa60; }

@keyframes popIn {
  from { transform: scale(0.6) translateY(8px); opacity: 0; }
  to   { transform: scale(1) translateY(0);     opacity: 1; }
}

.bowl-svg-wrap { width: 100%; display: flex; justify-content: center; margin-bottom: 5px; }
.bowl-svg-wrap svg { width: 64px; height: 56px; }

.bowl-grams {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 14px;
  color: var(--dark);
}
.bowl-idx { font-size: 10px; color: var(--mid); margin-top: 2px; }

/* ═══════════════ 진행 바 ═══════════════ */
.prog-wrap {
  width: 100%;
  max-width: 720px;
  margin-bottom: 18px;
}
.prog-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--mid); margin-bottom: 6px; }
.prog-track { background: var(--light); border-radius: 99px; height: 15px; overflow: hidden; }
.prog-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), #8fcf5a);
  border-radius: 99px;
  transition: width 0.38s cubic-bezier(0.34,1.56,0.64,1);
}

/* ═══════════════ 완료 ═══════════════ */
.done-wrap {
  display: none;
  width: 100%;
  max-width: 720px;
  background: linear-gradient(130deg, var(--accent2), #3a7028);
  color: #fff;
  border-radius: 18px;
  padding: 24px;
  text-align: center;
  box-shadow: 0 8px 30px rgba(90,138,60,0.3);
}
.done-wrap.show { display: block; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
.done-emoji { font-size: 38px; margin-bottom: 8px; }
.done-title { font-family: 'Black Han Sans', sans-serif; font-size: 20px; margin-bottom: 7px; }
.done-body  { font-size: 14px; opacity: 0.9; line-height: 1.8; white-space: pre-line; }

@keyframes numPop {
  0%   { transform: scale(1.3); }
  100% { transform: scale(1); }
}
.num-pop { animation: numPop 0.18s ease-out; }

@media (max-width: 520px) {
  .layout { grid-template-columns: 1fr; }
  .bowls-grid { grid-template-columns: repeat(3, 1fr); max-height: 260px; }
}
</style>
</head>
<body>

<h1>🌰 견과류 저울 시뮬레이터</h1>
<p class="subtitle">315g을 45g씩 나눠봐요</p>

<div class="layout">

  <!-- ── 왼쪽 ── -->
  <div class="scale-col">

    <!-- 저울 본체 -->
    <div class="scale-body">
      <div class="scale-brand">Nut Scale · NS-315</div>

      <!-- LCD -->
      <div class="lcd-outer">
        <div class="lcd-inner">
          <div class="lcd-num" id="lcdNum">315</div>
          <div class="lcd-unit">g</div>
        </div>
      </div>

      <!-- 견과류 + 접시 -->
      <div class="tray-section">
        <div class="nuts-stage">
          <canvas id="nutsCanvas"></canvas>
        </div>
        <div class="tray"></div>
        <div class="tray-stem"></div>
        <div class="tray-base"></div>
      </div>
    </div>

    <!-- 정보 카드 -->
    <div class="info-row">
      <div class="info-card">
        <div class="info-label">남은 무게</div>
        <div class="info-val red" id="remaining">315</div>
        <div class="info-sub">g</div>
      </div>
      <div class="info-card">
        <div class="info-label">덜어낸 횟수</div>
        <div class="info-val grn" id="count">0</div>
        <div class="info-sub">번</div>
      </div>
    </div>

    <!-- 버튼 -->
    <div class="btn-col">
      <button class="btn-main" id="scoopBtn" onclick="scoop()">🥜 45g 덜어내기</button>
      <button class="btn-sub" onclick="resetAll()">🔄 처음으로</button>
    </div>

  </div>

  <!-- ── 오른쪽: 그릇들 ── -->
  <div class="bowls-col">
    <div class="bowls-hdr">
      덜어낸 그릇
      <span class="badge" id="badge">0개</span>
    </div>
    <div class="bowls-grid" id="bowlsGrid"></div>
  </div>

</div>

<!-- 진행 바 -->
<div class="prog-wrap">
  <div class="prog-label">
    <span>덜어낸 양</span>
    <span id="progText">0 / 315g</span>
  </div>
  <div class="prog-track">
    <div class="prog-bar" id="progBar" style="width:0%"></div>
  </div>
</div>

<!-- 완료 -->
<div class="done-wrap" id="doneWrap">
  <div class="done-emoji">🎉</div>
  <div class="done-title" id="doneTitle"></div>
  <div class="done-body"  id="doneBody"></div>
</div>

<script>
// ── 상수 ──
const TOTAL = 315;
const UNIT  = 45;

let remaining = TOTAL;
let count = 0;
let finished = false;

// ── 캔버스 & 견과류 ──
const canvas = document.getElementById('nutsCanvas');
const ctx    = canvas.getContext('2d');

// 견과류 위치 (비율로 저장, 처음 한 번 생성)
let nuts = [];

function initNuts() {
  nuts = [];
  const W = canvas.offsetWidth || 280;
  const H = 90;
  canvas.width  = W * window.devicePixelRatio;
  canvas.height = H * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

  // 아몬드형 + 원형(헤이즐) + 작은원(잣) 혼합
  const count = 52;
  for (let i = 0; i < count; i++) {
    const type = i % 3; // 0=아몬드, 1=헤이즐, 2=잣
    nuts.push({
      x: 0.06 + Math.random() * 0.88,
      y: 0.15 + Math.random() * 0.72,
      type,
      angle: Math.random() * Math.PI,
      size: type === 2 ? 0.022 + Math.random() * 0.012
                       : 0.032 + Math.random() * 0.018,
      // 색상 변주
      hue: type === 0 ? '#c8882a'
         : type === 1 ? '#a06828'
         : '#d4aa60',
      shadow: type === 0 ? '#8a5018'
            : type === 1 ? '#704018'
            : '#a07828',
    });
  }
}

function drawNuts(ratio) {
  const W = canvas.width  / window.devicePixelRatio;
  const H = canvas.height / window.devicePixelRatio;
  ctx.clearRect(0, 0, W, H);

  // 보여줄 견과류 수 = ratio 에 비례
  const visible = Math.round(nuts.length * ratio);
  // 위쪽(y 작은)부터 사라지게 — 위에서 덜어내는 느낌
  const sorted = [...nuts].sort((a, b) => b.y - a.y); // y 큰 것(아래)부터
  const showing = sorted.slice(0, visible);

  for (const n of showing) {
    const x = n.x * W;
    const y = n.y * H;
    const s = n.size * W;

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(n.angle);

    // 그림자
    ctx.shadowColor = 'rgba(0,0,0,0.28)';
    ctx.shadowBlur  = 4;
    ctx.shadowOffsetY = 2;

    if (n.type === 0) {
      // 아몬드 (타원)
      ctx.beginPath();
      ctx.ellipse(0, 0, s, s * 0.56, 0, 0, Math.PI * 2);
      const g = ctx.createLinearGradient(-s, -s * 0.5, s, s * 0.5);
      g.addColorStop(0, '#e0a848');
      g.addColorStop(0.4, n.hue);
      g.addColorStop(1, n.shadow);
      ctx.fillStyle = g;
      ctx.fill();
      // 선
      ctx.shadowColor = 'transparent';
      ctx.strokeStyle = n.shadow;
      ctx.lineWidth = 0.7;
      ctx.beginPath();
      ctx.moveTo(-s * 0.1, -s * 0.5);
      ctx.lineTo(0, s * 0.5);
      ctx.stroke();

    } else if (n.type === 1) {
      // 헤이즐넛 (원)
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.62, 0, Math.PI * 2);
      const g2 = ctx.createRadialGradient(-s*0.2, -s*0.2, 0, 0, 0, s * 0.62);
      g2.addColorStop(0, '#d89040');
      g2.addColorStop(0.6, n.hue);
      g2.addColorStop(1, n.shadow);
      ctx.fillStyle = g2;
      ctx.fill();
      // 꼭지
      ctx.shadowColor = 'transparent';
      ctx.strokeStyle = '#604010';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.62);
      ctx.lineTo(0, -s);
      ctx.stroke();

    } else {
      // 잣 (작은 눈물방울)
      ctx.beginPath();
      ctx.ellipse(0, 0, s * 0.4, s * 0.7, 0, 0, Math.PI * 2);
      ctx.fillStyle = n.hue;
      ctx.fill();
    }

    ctx.restore();
  }
}

function resizeCanvas() {
  initNuts();
  drawNuts(remaining / TOTAL);
}

// ── 그릇 SVG ──
function bowlSVG(grams, isFull) {
  // 가득 찬 정도 비율
  const fillRatio = grams / UNIT;
  const nutCount  = Math.round(fillRatio * 9);
  const fillH     = 28 * fillRatio;
  const fillColor = isFull ? '#b8784a' : '#d4a06a';
  const fillTop   = 46 - fillH;

  // 견과류 점들
  let nutDots = '';
  const positions = [
    [32,38],[24,34],[40,34],[28,42],[36,42],[20,38],[44,38],[32,30],[28,46]
  ];
  for (let i = 0; i < Math.min(nutCount, positions.length); i++) {
    const [nx, ny] = positions[i];
    if (ny > fillTop - 2) {
      nutDots += `<ellipse cx="${nx}" cy="${ny}" rx="4" ry="2.5" fill="${isFull ? '#c86820' : '#e8a040'}" opacity="0.9"/>`;
    }
  }

  return `
  <svg viewBox="0 0 64 56" xmlns="http://www.w3.org/2000/svg">
    <!-- 그릇 몸통 -->
    <path d="M8 20 Q8 52 32 52 Q56 52 56 20 Z" fill="#e8ddd0"/>
    <!-- 내용물 -->
    <clipPath id="bowl-clip-${Math.random().toString(36).slice(2)}">
      <path d="M8 20 Q8 52 32 52 Q56 52 56 20 Z"/>
    </clipPath>
    <rect x="8" y="${fillTop}" width="48" height="${fillH + 10}"
      fill="${fillColor}" opacity="0.85"
      clip-path="url(#bowl-clip-${Math.random().toString(36).slice(2)})"/>
    <!-- 견과류 -->
    ${nutDots}
    <!-- 그릇 테두리 -->
    <path d="M8 20 Q8 52 32 52 Q56 52 56 20 Z"
      fill="none" stroke="#c0a888" stroke-width="2"/>
    <!-- 그릇 입구 타원 -->
    <ellipse cx="32" cy="20" rx="24" ry="6"
      fill="#f0e8dc" stroke="#c0a888" stroke-width="1.5"/>
    <!-- 그릇 하이라이트 -->
    <path d="M14 28 Q16 46 24 50" stroke="rgba(255,255,255,0.35)" stroke-width="2" fill="none" stroke-linecap="round"/>
  </svg>`;
}

// ── 핵심 로직 ──
function scoop() {
  if (finished) return;

  let scooped;
  if (remaining >= UNIT) {
    scooped = UNIT;
    remaining -= UNIT;
  } else if (remaining > 0) {
    scooped = remaining;
    remaining = 0;
  } else return;

  count++;
  const isRemainder = scooped < UNIT;

  updateDisplay();
  drawNuts(remaining / TOTAL);
  addBowlCard(scooped, count, isRemainder);

  if (remaining === 0) finish();
}

function updateDisplay() {
  const el = document.getElementById('lcdNum');
  el.textContent = remaining;
  el.classList.remove('num-pop');
  void el.offsetWidth;
  el.classList.add('num-pop');

  document.getElementById('remaining').textContent = remaining;
  document.getElementById('count').textContent = count;
  document.getElementById('badge').textContent = count + '개';

  const used = TOTAL - remaining;
  document.getElementById('progBar').style.width = (used / TOTAL * 100) + '%';
  document.getElementById('progText').textContent = `${used} / ${TOTAL}g`;

  const btn = document.getElementById('scoopBtn');
  if (remaining > 0 && remaining < UNIT && !finished) {
    btn.textContent = `🥜 ${remaining}g 덜어내기 (나머지)`;
  } else if (remaining === 0) {
    btn.disabled = true;
    btn.textContent = '모두 나눴어요! 🎉';
  }
}

function addBowlCard(grams, idx, isRem) {
  const grid = document.getElementById('bowlsGrid');
  const card = document.createElement('div');
  card.className = 'bowl-card ' + (isRem ? 'rem' : 'full');
  card.innerHTML = `
    <div class="bowl-svg-wrap">${bowlSVG(grams, !isRem)}</div>
    <div class="bowl-grams">${grams}g</div>
    <div class="bowl-idx">#${idx}${isRem ? ' 나머지' : ''}</div>
  `;
  grid.appendChild(card);
  grid.scrollTop = grid.scrollHeight;
}

function finish() {
  finished = true;
  const full = Math.floor((TOTAL - (TOTAL % UNIT)) / UNIT);
  const rem  = TOTAL % UNIT;

  document.getElementById('doneTitle').textContent = `총 ${count}번 나눴어요!`;
  document.getElementById('doneBody').textContent = rem > 0
    ? `45g 그릇 ${full}개 + 나머지 ${rem}g\n315 ÷ 45 = ${full} … ${rem}`
    : `45g 그릇 ${full}개, 나머지 없이 딱 나눠졌어요!\n315 ÷ 45 = ${full}`;
  document.getElementById('doneWrap').classList.add('show');
}

function resetAll() {
  remaining = TOTAL; count = 0; finished = false;

  document.getElementById('lcdNum').textContent = TOTAL;
  document.getElementById('remaining').textContent = TOTAL;
  document.getElementById('count').textContent = '0';
  document.getElementById('badge').textContent = '0개';
  document.getElementById('progBar').style.width = '0%';
  document.getElementById('progText').textContent = `0 / ${TOTAL}g`;
  document.getElementById('scoopBtn').disabled = false;
  document.getElementById('scoopBtn').textContent = '🥜 45g 덜어내기';
  document.getElementById('doneWrap').classList.remove('show');
  document.getElementById('bowlsGrid').innerHTML = '';
  drawNuts(1);
}

// ── 초기화 ──
window.addEventListener('load', () => {
  resizeCanvas();
});
window.addEventListener('resize', resizeCanvas);
</script>
</body>
